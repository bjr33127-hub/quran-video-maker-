<!doctype html> 
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quran Video Maker</title>
  <link rel="icon" type="image/png" sizes="512x512" href="./logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Aref+Ruqaa+Ink:wght@400;700&family=Cairo:wght@400;700;900&family=Cinzel:wght@500;700&family=Lateef:wght@400;700&family=Montserrat:wght@500;700;800&family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Raleway:wght@500;700;800&family=Reem+Kufi:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0b0d12; --panel:#121826; --panel2:#0f1522;
      --text:#fff; --muted:rgba(255,255,255,.75);
      --r:18px;

      /* Variables de polices dynamiques */
      --font-ar: "Amiri", serif;
      --font-fr: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      --font-cal-surah: "Aref Ruqaa Ink", serif;
      --font-cal-reciter: "Playfair Display", serif;
      --cal-surah-size: 38px;
      --cal-surah-weight: 700;
      --cal-surah-spacing: .01em;

      /* base palette for text FX (changes via data-textfx) */
      --fxA: rgba(255,255,255,.18);
      --fxB: rgba(255,255,255,.10);
      --inkTop: rgba(255,255,255,.96);
      --inkMid: rgba(255,255,255,.82);
      --inkBot: rgba(255,255,255,.70);
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    .app{height:100vh;display:flex;flex-direction:column;gap:12px;padding:14px;overflow:hidden}
    
    .bar{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:stretch;
      background:var(--panel);
      border-radius:var(--r);
      padding:10px 12px;
      position:relative;
      overflow:visible;
      z-index:20;
    }
    .bar-primary,
    .bar-advanced{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }
    .bar-primary{
      justify-content:space-between;
    }
    .primary-selects,
    .primary-actions,
    .status-group{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }
    .status-group{
      margin-left:auto;
    }
    .player-group{
      display:flex;
      align-items:center;
      gap:0;
      padding:4px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      box-shadow: 0 10px 22px rgba(0,0,0,.18);
    }
    .player-group button{
      border-radius:12px;
      min-width:48px;
      box-shadow:none;
    }
    .player-group button + button{
      margin-left:4px;
    }
    .bar-advanced{
      position:absolute;
      top:calc(100% + 8px);
      left:0;
      right:0;
      padding:12px;
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      background:rgba(18,24,38,.98);
      box-shadow: 0 18px 44px rgba(0,0,0,.36);
      backdrop-filter: blur(14px);
      z-index:35;
    }
    .app[data-menu-open="0"] .bar-advanced{
      display:none;
    }
    .menu-grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap:12px;
      width:100%;
    }
    .menu-section{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }
    .menu-section h3{
      width:100%;
      margin:0 0 2px;
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(255,255,255,.72);
    }
    .pill{display:flex;gap:8px;align-items:center;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.06)}
    label{font-size:12px;color:var(--muted)}
    select,button,input[type="checkbox"]{border:0;outline:none}
    select,button{
      border-radius:12px;padding:10px 12px;background:rgba(255,255,255,.10);
      color:var(--text);font-size:14px
    }
    button{cursor:pointer} button:hover{background:rgba(255,255,255,.16)}
    button:disabled{opacity:.5;cursor:not-allowed}
    .spacer{flex:1}
    .status{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55vw}

    .stage{flex:1;min-height:0;background:var(--panel2);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:10px;overflow:hidden;position:relative;}
    .meta{display:flex;justify-content:space-between;gap:10px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; z-index:2;}
    .content{flex:1;min-height:0;display:flex;flex-direction:column;gap:8px;overflow:hidden; z-index:2;}
    .app[data-minimal-ui="1"] .meta,
    .app[data-minimal-ui="1"] .dbg,
    .app[data-minimal-ui="1"] .footer,
    .app[data-minimal-ui="1"] .brand{
      display:none !important;
    }
    .app[data-minimal-ui="1"] .content{
      gap:4px;
    }


    .box{
      flex:1;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 16px 12px;
      background:rgba(255,255,255,.03);
      border-radius:16px;
      overflow:hidden;
      position:relative;
      isolation:isolate;
    }

    .arabic{
      direction:rtl;
      unicode-bidi:isolate;
      text-align:center;
      margin:0;
      font-family: var(--font-ar);
      font-weight:700;
      line-height:2.2;
      padding-top:4px;
      font-size:52px;
      white-space:nowrap;
      overflow:hidden;
    }

    .fr{
      direction:ltr;text-align:center;
      line-height:1.45;margin:0;font-weight:600;
      font-family: var(--font-fr);
      font-size:28px;
      white-space:normal;
      overflow:hidden;
      max-width: 92%;
    }
    :root[data-mobile="1"] #fr{
      max-width: 50%;         
      line-height: 1.2;      
    }

    /* =========================
       SÉPARATEUR / ENJOLIVEUR
       ========================= */
    .separator-box {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
      margin: -6px 0;
      opacity: 0.85;
      font-size: 24px;
      user-select: none;
    }
    .separator-box span {
      display: inline-block;
      transition: all 0.3s ease;
    }

    /* =========================
       CALLIGRAPHIE FOOTER
       ========================= */
    .cal-footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 4px;
      padding-bottom: 8px;
      z-index: 2;
    }
    .cal-harakat{
      font-family: 'Amiri', 'Scheherazade New', serif;
      font-size: 14px;
      line-height: 1;
      direction: rtl;
      text-align:center;
      letter-spacing: .22em;
      opacity: .78;
      min-height: 16px;
    }
    .cal-surah {
      font-family: var(--font-cal-surah);
      font-size: var(--cal-surah-size, 38px);
      font-weight: var(--cal-surah-weight, 700);
      letter-spacing: var(--cal-surah-spacing, .01em);
      line-height: 1;
      direction: rtl;
      text-align:center;
    }
    .cal-surah::before,
    .cal-surah::after {
      display: inline-block;
      font-size: .56em;
      opacity: .76;
      margin-inline: .45em;
      vertical-align: middle;
    }
    .cal-surah::before { content: attr(data-ornament-left); }
    .cal-surah::after { content: attr(data-ornament-right); }
    .cal-reciter {
      font-family: var(--font-cal-reciter);
      font-size: 25px;
      font-weight: 700;
      letter-spacing: .08em;
      direction: ltr;
      unicode-bidi: isolate;
      opacity: 0.96;
      margin-top: 2px;
      line-height: 1.25;
      text-align: center;
      text-transform: none;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,.26));
    }
    .cal-footer[data-calligraphy-style="thuluth-ornate"] .cal-surah {
      font-size: 42px;
      letter-spacing: .03em;
      text-shadow: 0 0 18px rgba(247,212,106,.16), 0 10px 22px rgba(0,0,0,.28);
    }
    .cal-footer[data-calligraphy-style="thuluth-soft"] .cal-surah {
      font-size: 40px;
      letter-spacing: .02em;
      text-shadow: 0 0 14px rgba(255,255,255,.12), 0 10px 22px rgba(0,0,0,.24);
    }
    .cal-footer[data-calligraphy-style="modern-noor"] .cal-surah {
      font-size: 39px;
      letter-spacing: .01em;
      text-shadow: 0 0 24px rgba(125,211,255,.12), 0 10px 24px rgba(0,0,0,.22);
    }
    .cal-footer[data-calligraphy-style="ink-minimal"] .cal-surah {
      font-size: 37px;
      letter-spacing: 0;
      text-shadow: none;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,.18));
    }
    .cal-footer[data-calligraphy-style="diwani-gold"] .cal-surah {
      font-size: 43px;
      letter-spacing: .02em;
      text-shadow: 0 0 22px rgba(247,212,106,.22), 0 12px 24px rgba(0,0,0,.26);
    }
    .cal-footer[data-calligraphy-style="mushaf-royal"] .cal-surah {
      font-size: 41px;
      letter-spacing: .025em;
      text-shadow: 0 0 18px rgba(255,90,120,.16), 0 0 26px rgba(247,212,106,.14);
    }
    .cal-footer[data-calligraphy-style="emerald-scribe"] .cal-surah {
      font-size: 40px;
      letter-spacing: .015em;
      text-shadow: 0 0 24px rgba(110,255,214,.18), 0 10px 22px rgba(0,0,0,.24);
    }
    .cal-footer[data-calligraphy-style="night-orbit"] .cal-surah {
      font-size: 41px;
      letter-spacing: .035em;
      text-shadow: 0 0 20px rgba(180,125,255,.20), 0 0 28px rgba(100,200,255,.12);
    }

    .error{color:#ffb4b4;font-size:12px;white-space:pre-wrap}
    .footer{font-size:11px;color:var(--muted);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; z-index:2;}
    .dbg{font-size:11px;color:rgba(255,255,255,.6);white-space:pre-wrap; z-index:2;}

    tajweed{display:inline}
    .ayah-end{font-weight:900;padding-inline:6px;white-space:nowrap}

    select{
      background-color: rgba(255,255,255,.10);
      color: #fff;
      border: 1px solid rgba(255,255,255,.18);
      color-scheme: dark;
      max-width: 360px;
    }
    select option{background-color:#121826;color:#fff}
    select optgroup{background-color:#121826;color:rgba(255,255,255,.85)}
    select:focus{outline:2px solid rgba(255,255,255,.25);outline-offset:2px}

    #measure{
      position:absolute;
      left:-99999px; top:-99999px;
      visibility:hidden;
      pointer-events:none;
      white-space:nowrap;
    }

    .toggle{
      display:flex; align-items:center; gap:8px;
      padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.06)
    }
    .toggle input{ width:16px;height:16px; accent-color:#fff; }

    /* =========================
       TEXT FX (Selectable) - S'applique aussi aux séparateurs et à la calligraphie !
       ========================= */

    #ar, #fr, .separator-box span, .cal-surah, .cal-reciter {
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      filter: drop-shadow(0 10px 28px rgba(0,0,0,.34));
      position:relative;
      z-index:1; 
    }

    [data-textfx]:not([data-textfx="clean"]){
      background-image: linear-gradient(180deg,var(--inkTop) 0%,var(--inkMid) 55%,var(--inkBot) 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    [data-textfx]:not([data-textfx="clean"]) {
      text-shadow:
        0 0 18px var(--fxA),
        0 0 46px var(--fxB);
    }

    [data-textfx="neon"] {
      --fxA: rgba(125,211,255,.28);
      --fxB: rgba(70,150,255,.16);
      --inkTop: rgba(255,255,255,.98);
      --inkMid: rgba(230,248,255,.86);
      --inkBot: rgba(198,235,255,.72);
    }
    [data-textfx="lightning"] {
      --fxA: rgba(120,220,255,.44);
      --fxB: rgba(70,140,255,.24);
      --inkTop: rgba(255,255,255,1);
      --inkMid: rgba(205,240,255,.96);
      --inkBot: rgba(118,190,255,.84);
    }
    [data-textfx="reflect"] {
      --fxA: rgba(225,245,255,.42);
      --fxB: rgba(120,200,255,.18);
      --inkTop: rgba(255,255,255,1);
      --inkMid: rgba(220,246,255,.98);
      --inkBot: rgba(168,210,235,.82);
    }

    [data-textfx="luxe"] {
      --fxA: rgba(247,212,106,.26);
      --fxB: rgba(247,212,106,.12);
      --inkTop: rgba(255,244,210,.98);
      --inkMid: rgba(255,226,140,.86);
      --inkBot: rgba(225,185,85,.72);
    }

    [data-textfx="aurora"] {
      --fxA: rgba(150,255,220,.22);
      --fxB: rgba(120,200,255,.14);
      --inkTop: rgba(235,255,250,.98);
      --inkMid: rgba(200,255,236,.86);
      --inkBot: rgba(170,210,255,.72);
    }
    [data-textfx="emerald"] {
      --fxA: rgba(34, 255, 163, .40);
      --fxB: rgba(16, 185, 129, .24);
      --inkTop: rgba(245,255,250,1);
      --inkMid: rgba(126,255,203,.95);
      --inkBot: rgba(0,186,117,.78);
    }
    
    [data-textfx="ethereal"] {
      --fxA: rgba(255,255,255,.45);
      --fxB: rgba(200,220,255,.20);
      --inkTop: rgba(255,255,255,1);
      --inkMid: rgba(245,250,255,.95);
      --inkBot: rgba(210,230,255,.80);
    }

    [data-textfx="royal"] {
      --fxA: rgba(255,70,90,.32);
      --fxB: rgba(255,215,0,.18);
      --inkTop: rgba(255,245,215,1);
      --inkMid: rgba(255,190,190,.92);
      --inkBot: rgba(210,60,80,.82);
    }

    [data-textfx="cosmic"] {
      --fxA: rgba(180,100,255,.35);
      --fxB: rgba(100,200,255,.22);
      --inkTop: rgba(255,255,255,1);
      --inkMid: rgba(235,210,255,.94);
      --inkBot: rgba(160,110,255,.78);
    }

    [data-textfx="clean"] {
      text-shadow:none;
    }

    /* =========================
       MINI PARTICLES (Selectable)
       ========================= */
    .fx-particles{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:0;
      opacity:0;
      transition: opacity .25s ease;
    }
    .fx-particles.on{ opacity:1; }

    .fx-particles .p{
      position:absolute;
      left: calc(var(--x) * 1%);
      top:  calc(var(--y) * 1%);
      width: calc(var(--s) * 1px);
      height: calc(var(--s) * 1px);
      border-radius:999px;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.95) 0 28%, rgba(255,255,255,.25) 52%, transparent 70%);
      opacity:0;
      transform: translate(-50%,-50%) scale(.8);
      filter: blur(.2px);
      animation: floaty var(--t) ease-in-out infinite;
      animation-delay: calc(var(--d) * 1ms);
      mix-blend-mode: screen;
    }
    .fx-particles .p.orb{
      width: calc(var(--s) * 1.8px);
      height: calc(var(--s) * 1.8px);
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.95) 0 18%, rgba(190,255,235,.42) 35%, rgba(110,255,214,.12) 60%, transparent 76%);
      filter: blur(.8px);
      opacity:.15;
    }
    .fx-particles .p.halo{
      width: calc(var(--s) * 2.8px);
      height: calc(var(--s) * 2.8px);
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.95) 0 12%, rgba(225,250,255,.18) 24%, transparent 42%),
        radial-gradient(circle at 50% 50%, transparent 0 38%, rgba(175,240,255,.28) 46%, transparent 62%),
        radial-gradient(circle at 50% 50%, rgba(120,255,214,.08) 0 54%, transparent 76%);
      filter: blur(1.2px);
      opacity:.16;
      box-shadow: 0 0 18px rgba(180,240,255,.18), 0 0 28px rgba(90,210,255,.10);
      animation: haloFloat var(--t) ease-in-out infinite;
    }
    .fx-particles .p.mist{
      width: calc(var(--s) * 3.5px);
      height: calc(var(--s) * 2.2px);
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.26) 0 30%, rgba(160,255,220,.12) 44%, transparent 75%);
      filter: blur(4px);
      opacity:.13;
    }
    .fx-particles .p.smoke{
      width: calc(var(--s) * 10px);
      height: calc(var(--s) * 3.9px);
      border-radius: 999px;
      background:
        radial-gradient(ellipse at 18% 55%, rgba(255,255,255,.16) 0 18%, rgba(210,255,240,.12) 24%, transparent 58%),
        radial-gradient(ellipse at 42% 44%, rgba(255,255,255,.15) 0 22%, rgba(175,245,225,.11) 28%, transparent 60%),
        radial-gradient(ellipse at 67% 58%, rgba(255,255,255,.13) 0 19%, rgba(150,220,205,.09) 26%, transparent 58%),
        radial-gradient(ellipse at 84% 46%, rgba(255,255,255,.12) 0 16%, rgba(160,210,198,.08) 22%, transparent 56%);
      filter: blur(12px);
      opacity:.16;
      animation: smokeFloat var(--t) linear infinite;
      mix-blend-mode: screen;
    }
    .fx-particles .p.lightning{
      width: calc(var(--s) * 1.2px);
      height: calc(var(--s) * 9px);
      border-radius: 999px;
      background: linear-gradient(180deg, transparent 0%, rgba(135,220,255,.12) 12%, rgba(255,255,255,.98) 48%, rgba(120,190,255,.42) 76%, transparent 100%);
      filter: blur(.35px);
      opacity:.18;
      box-shadow: 0 0 10px rgba(120,220,255,.22), 0 0 22px rgba(70,140,255,.14);
      animation: lightningFloat var(--t) linear infinite;
      mix-blend-mode: screen;
    }
    @keyframes floaty{
      0%   { opacity:0; transform:translate(-50%,-50%) translate(0, 10px) scale(.8); }
      18%  { opacity:.55; }
      55%  { opacity:.30; transform:translate(-50%,-50%) translate(calc(var(--dx)*1px), -8px) scale(1.05); }
      100% { opacity:0; transform:translate(-50%,-50%) translate(calc(var(--dx2)*1px), -22px) scale(.92); }
    }
    @keyframes smokeFloat{
      0%   { opacity:0; transform:translate(-50%,-50%) translate(calc(var(--dx)*-1.4px), 6px) scale(.82, .72); }
      12%  { opacity:.14; }
      48%  { opacity:.11; transform:translate(-50%,-50%) translate(calc(var(--dx)*1.4px), -2px) scale(1.08, .82); }
      82%  { opacity:.08; transform:translate(-50%,-50%) translate(calc(var(--dx2)*1.9px), -8px) scale(1.26, .9); }
      100% { opacity:0; transform:translate(-50%,-50%) translate(calc(var(--dx2)*2.3px), -12px) scale(1.38, .94); }
    }
    @keyframes haloFloat{
      0%   { opacity:0; transform:translate(-50%,-50%) translate(0, 10px) scale(.72); }
      18%  { opacity:.18; }
      52%  { opacity:.14; transform:translate(-50%,-50%) translate(calc(var(--dx)*.9px), -6px) scale(1.05); }
      82%  { opacity:.10; transform:translate(-50%,-50%) translate(calc(var(--dx2)*1.1px), -14px) scale(1.18); }
      100% { opacity:0; transform:translate(-50%,-50%) translate(calc(var(--dx2)*1.2px), -20px) scale(1.26); }
    }
    @keyframes lightningFloat{
      0%   { opacity:0; transform:translate(-50%,-50%) rotate(var(--rot)) translate(0, 12px) scale(.72, .88); }
      12%  { opacity:.10; }
      16%  { opacity:.26; }
      19%  { opacity:.06; }
      24%  { opacity:.22; }
      50%  { opacity:.10; transform:translate(-50%,-50%) rotate(var(--rot)) translate(calc(var(--dx)*.8px), -4px) scale(.9, 1.08); }
      78%  { opacity:.16; }
      100% { opacity:0; transform:translate(-50%,-50%) rotate(var(--rot)) translate(calc(var(--dx2)*1.1px), -18px) scale(1.06, 1.22); }
    }
    @media (prefers-reduced-motion: reduce){
      .fx-particles .p{ animation:none; opacity:.25; }
    }

    /* =========================
       WBW highlight (QUL)
       ========================= */
    #ar{
      --pA: rgba(255,255,255,.85);
      --pB: rgba(255,255,255,.35);
      --pC: rgba(255,255,255,.15);
    }
    .rtl-line{ direction: rtl; unicode-bidi: isolate; }

    #ar[data-wbw="on"]{
      filter:none;
      text-shadow:none;
    }
    #ar[data-wbw="on"] .w{
      display:inline-block;
      position:relative;
      unicode-bidi:isolate;
      margin:0;
      padding:0 .10em;
      transform: translateZ(0);
      will-change: transform, filter, text-shadow;
      transition: transform .22s ease, filter .30s ease, text-shadow .30s ease, opacity .30s ease;
      color: rgba(255,255,255,.98);
      text-shadow: none;
      filter: none;
      opacity: .96;
    }
    #measure .w{
      display:inline-block;
      unicode-bidi:isolate;
      margin:0;
      padding:0 .10em;
    }
    #measure .rtl-line{ direction:rtl; unicode-bidi:isolate; }

    #ar[data-wbw="on"] .w.hl{
      transform: translateY(-1px);
      background-size: 220% 100%;
      background-position: 0% 50%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      animation: shimmer 1.6s ease-in-out infinite;
    }

    @keyframes shimmer{
      0%{ background-position: 0% 50%; }

    .toggle input[type="checkbox"]:checked::after{

      height: 9px;

  async function fetchWithTimeout(url, ms=12000){
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), ms);
    try{ return await fetch(url, { signal: ctrl.signal }); }
    finally { clearTimeout(t); }
  }

  async function headRangeOk(url, ms=12000){
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), ms);
    try{
      const res = await fetch(url, {
        signal: ctrl.signal,
        cache: "no-store",
        headers: { "Range": "bytes=0-0" }
      });
      return (res.ok || res.status === 206);
    } finally {
      clearTimeout(t);
    }
  }
  async function pickFirstWorkingMp3(urls){

    return u.replace(/^http:\/\//i, "https://");

  function slugTitleCase(slug){
    const small = new Set(["al", "as", "ar", "ad", "an", "ash", "at", "bin", "ibn"]);
    return String(slug || "").split("-").filter(Boolean).map((part, idx) => {
      const lower = part.toLowerCase();
      if(idx > 0 && small.has(lower)) return lower;
      return lower.charAt(0).toUpperCase() + lower.slice(1);
    }).join(" ");
  }

  function extractReciterBaseSlug(reciter){
    const raw = [reciter?.jsonPath, reciter?.name, reciter?.reciter_name, reciter?.id, reciter?.readId]
      .filter(Boolean)
      .map(String)
      .join(" | ");

    let slug = raw.toLowerCase()
      .replace(/\.json/g, "")
      .replace(/\.\//g, "-")
      .replace(/[\_\/|]+/g, "-")
      .replace(/q\s*u\s*l\s*[—-]?/g, "")
      .replace(/mp3quran\s*[—-]?/g, "")
      .replace(/ayah-recitation-/g, "")
      .replace(/qul-ayah-/g, "")
      .replace(/recitation-/g, "")
      .replace(/[^a-z0-9-]+/g, "-")
      .replace(/-+/g, "-")
      .replace(/^-|-$/g, "");

    const parts = slug.split("-").filter(Boolean);
    const cutWords = new Set(["recitation", "murattal", "mujawwad", "hafs", "warsh", "segments", "read", "riwaya", "riwayah"]);
    while(parts.length){
      const last = parts[parts.length - 1];
      if(/^\d+$/.test(last) || cutWords.has(last)){
        parts.pop();
        continue;
      }
      break;
    }

    const joined = parts.join("-");
    const aliases = [
      "abdul-basit-abdul-samad",
      "abdur-rahman-as-sudais",
      "abdul-rahman-al-sudais",
      "abu-bakr-al-shatri",
      "hani-ar-rifai",
      "khalifa-al-tunaiji",
      "maher-al-mu-aiqly",
      "mahmoud-khalil-al-husary",
      "mishari-rashid-al-afasy",
      "mohamed-al-tablawi",
      "muhammad-siddiq-al-minshawi",
      "saad-al-ghamdi",
      "saud-al-shuraim",
      "yasser-al-dosari",
      "abdullah-awad-al-juhany",
      "abdullah-matroud",
      "ahmed-neena",
      "akram-al-alaqimy",
      "ali-hajjaj-al-suesy",
      "aziz-alili",
      "khaalid-abdullah-al-qahtani",
      "muhammad-ayyub-bin-muhammad-yusuf"
    ];
    for(const alias of aliases){
      if(joined.includes(alias)) return alias;
    }
    return joined;
  }

  // ===== QUL manifest loader =====
  function normalizeQulManifestItem(x){
    if(!x || typeof x !== "object") return null;
    const id = String(x.id || "").trim();
    const name = String(x.name || "").trim();
    const jsonPath = String(x.jsonPath || x.path || "").trim();
    if(!id || !jsonPath) return null;
    return { id, name: name || ("QUL — " + id), type: "qul_ayah", jsonPath };
  }

  async function loadQulManifest(){
    try{
      const res = await fetchWithTimeout(QUL_MANIFEST_PATH, 15000);
      if(!res.ok) throw new Error(`HTTP ${res.status} sur ${QUL_MANIFEST_PATH}`);
      const json = await res.json();
      if(!Array.isArray(json)) throw new Error("manifest.json: attendu un tableau JSON.");
      const items = json.map(normalizeQulManifestItem).filter(Boolean);
      if(!items.length) throw new Error("manifest.json: aucun item valide.");
      items.sort((a,b) => String(a.name).localeCompare(String(b.name), "fr", {sensitivity:"base"}));
      QUL_AYAH_RECITERS = items;
      showDbg(`QUL manifest chargé ✅\nCount: ${QUL_AYAH_RECITERS.length}\nSource: ${QUL_MANIFEST_PATH}`);
      return true;
    } catch(e){
      showDbg("⚠️ QUL manifest non chargé (fallback shatri).\n" + String(e));
      return false;
    }
  }

    const map = ["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"];

  }
  function buildAyahMarkerHtml(inSurah){
    return ` <span class="ayah-end">﴿${toArabicIndicDigits(inSurah)}﴾</span>`;
  }

  function stripTrailingAyahNumberHtml(rawHtml){
    const div = document.createElement("div");
    div.innerHTML = rawHtml || "";
    const stripDigitsFromTextNode = (node) => {
      const before = node.nodeValue;
      const after = (before || "").replace(/[\s\u00A0]*[\d٠-٩]+[\s\u00A0]*$/u, "");
      if (after !== before) { node.nodeValue = after; return true; }
      return false;
    };
    while (div.lastChild) {
      const n = div.lastChild;
      if (n.nodeType === Node.TEXT_NODE) {
        const changed = stripDigitsFromTextNode(n);
        if (!n.nodeValue || !n.nodeValue.trim()) div.removeChild(n);
        if (changed) break;
        break;
      }
      if (n.nodeType === Node.ELEMENT_NODE) {
        if (!n.textContent || !n.textContent.trim()) { div.removeChild(n); continue; }
        let cur = n; while (cur && cur.lastChild) cur = cur.lastChild;
        if (cur && cur.nodeType === Node.TEXT_NODE) {
          const changed = stripDigitsFromTextNode(cur);
          if (!cur.nodeValue || !cur.nodeValue.trim()) {
            let p = cur.parentNode;
            cur.parentNode.removeChild(cur);
            while (p && p !== div && (!p.textContent || !p.textContent.trim())) {
              const next = p.parentNode;
              p.parentNode.removeChild(p);
              p = next;
            }
          }
          if (changed) break;
        }
        break;
      }
      break;
    }
    return div.innerHTML.trim();
  }

  // ===== Tokenisation =====
  function tokensFromTajweedHtml(html){
    const root = document.createElement("div");
    root.innerHTML = html || "";
    const tokens = [];
    let buf = "";
    const pushBuf = () => {
      const t = buf.trim();
      if(t) tokens.push(t);
      buf = "";
    };
    const walk = (node) => {
      if(node.nodeType === Node.TEXT_NODE){
        const parts = node.nodeValue.split(/(\s+)/);
        for(const p of parts){
          if(!p) continue;
          if(/\s+/.test(p)) pushBuf();
          else buf += p;
        }
        return;
      }
      if(node.nodeType === Node.ELEMENT_NODE){
        const txt = node.textContent || "";
        if(/\s/.test(txt)){
          const tag = node.tagName.toLowerCase();
          let open = "<" + tag;
          for(const attr of node.attributes){
            open += ` ${attr.name}="${attr.value.replaceAll('"','&quot;')}"`;
          }
          open += ">";
          const close = `</${tag}>`;
          buf += open;
          for(const child of node.childNodes) walk(child);
          buf += close;
        } else {
          buf += node.outerHTML;
        }
      }
    };
    for(const child of root.childNodes) walk(child);
    pushBuf();
    return tokens;
  }

  // ===== ۞ detection (skippable) =====
  function plainTextFromHtml(html){
    const div = document.createElement("div");
    div.innerHTML = html || "";
    return (div.textContent || "").replace(/\s+/g," ").trim();
  }
  function isSkippableToken(tokenHtml){
    const t = plainTextFromHtml(tokenHtml);
    return t === "۞";
  }

  function isPunctOnlyToken(tokenHtml){
    const t = plainTextFromHtml(tokenHtml).trim();
    return /^[،,؛;:!?؟.…]+$/.test(t) || /^[\)\]\}»”’]+$/.test(t);
  }

  function isArabicPauseBoundaryToken(tokenHtml){
    const t = plainTextFromHtml(tokenHtml).trim();
    return /[ۭ۪ۖۗۚۛۜۘۙ۟۠ۢ۫]/.test(t) || /[،؛.؟!…]/.test(t);
  }

  function buildPreferredLineBreaks(tokens){
    const out = new Set();
    for(let i=1;i<tokens.length;i++){
      const prev = tokens[i-1] || "";
      const curTxt = plainTextFromHtml(tokens[i] || "");
      if(isArabicPauseBoundaryToken(prev)) out.add(i);
      if(/^(و|ف|ثم|لكن|بل)\b/.test(curTxt)) out.add(i);
    }
    return out;
  }

  function buildPauseBreaksFromSegments(segments, tokensLen){
    const out = new Set();
    if(!Array.isArray(segments) || !segments.length || !Number.isFinite(tokensLen)) return out;
    for(let i=1;i<Math.min(segments.length, tokensLen);i++){
      const prev = segments[i-1];
      const cur = segments[i];
      if(!prev || !cur) continue;
      const prevEnd = Number(prev[2]);
      const curStart = Number(cur[1]);
      if(!Number.isFinite(prevEnd) || !Number.isFinite(curStart)) continue;
      const gap = curStart - prevEnd;
      if(gap >= 180) out.add(i);
    }
    return out;
  }

  function buildCountMap(tokens){
    const countBefore = new Array(tokens.length + 1).fill(0);
    for(let i=0;i<tokens.length;i++){
      const inc = isSkippableToken(tokens[i]) ? 0 : 1;
      countBefore[i+1] = countBefore[i] + inc;
    }
    return { countBefore, total: countBefore[tokens.length] };
  }
  function buildEffToToken(tokens){
    const effToTok = [];
    for(let i=0;i<tokens.length;i++){
      if(isSkippableToken(tokens[i])) continue;
      effToTok.push(i);
    }
    return effToTok;
  }

  // ===== Découpe en lignes =====
  function computeLinesForTokensFast(tokens, boxWidthPx, arEl, opts={}){
    const cs = getComputedStyle(arEl);
    const slackPx = Number.isFinite(opts.slackPx) ? opts.slackPx : 32;
    const widthPx = Math.max(0, boxWidthPx - slackPx);

    $measure.style.fontFamily = cs.fontFamily;
    $measure.style.fontSize = cs.fontSize;
    $measure.style.fontWeight = cs.fontWeight;
    $measure.style.direction = "rtl";
    $measure.style.unicodeBidi = "isolate";
    $measure.style.whiteSpace = "nowrap";
    $measure.style.width = widthPx + "px";

    const wrapped = new Array(tokens.length);
    for(let i=0;i<tokens.length;i++){
      wrapped[i] = `<span class="w">${tokens[i]}</span>`;
    }

    const setMeasureRange = (s,e) => {
      $measure.innerHTML = `<span class="rtl-line">${wrapped.slice(s,e).join(" ")}</span>`;
    };
    const fits = (s,e) => { setMeasureRange(s,e); return $measure.scrollWidth <= widthPx; };

    const preferredBreaks = buildPreferredLineBreaks(tokens);
    const extraBreaks = opts.extraPreferredBreaks instanceof Set ? opts.extraPreferredBreaks : null;
    if(extraBreaks){
      for(const b of extraBreaks) preferredBreaks.add(b);
    }

    const lines = [];
    let start = 0;

    while(start < tokens.length){
      if(!fits(start, start+1)){
        lines.push({ start, end: start+1 });
        start++;
        continue;
      }

      let lo = start+1, hi = tokens.length, best = lo;
      while(lo <= hi){
        const mid = (lo + hi) >> 1;
        if(fits(start, mid)){ best = mid; lo = mid + 1; }
        else hi = mid - 1;
      }

      let bestPreferred = -1;
      const backMin = Math.max(start + 1, best - 12);
      for(let cand = best; cand >= backMin; cand--){
        if(preferredBreaks.has(cand) && fits(start, cand)){
          bestPreferred = cand;
          break;
        }
      }
      if(bestPreferred > 0) best = bestPreferred;

      while(best < tokens.length && isPunctOnlyToken(tokens[best]) && fits(start, best + 1)){
        best += 1;
      }

      lines.push({ start, end: best });
      start = best;
    }

    const wordToLine = new Array(tokens.length).fill(0);
    for(let li=0; li<lines.length; li++){
      const ln = lines[li];
      for(let i=ln.start; i<ln.end; i++) wordToLine[i] = li;
    }
    return { lines, wordToLine };
  }

  // ===== Alignement FR <-> AR =====
  function normalizeArabicForAlign(s){
    return String(s || "")
      .normalize("NFKD")
      .replace(/[\u064B-\u065F\u0670\u06D6-\u06ED]/g, "")
      .replace(/[ٱأإآ]/g, "ا")
      .replace(/ة/g, "ه")
      .replace(/ى/g, "ي")
      .replace(/[ـ]/g, "")
      .trim();
  }

  function normalizeLatinForAlign(s){
    return String(s || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[’']/g, "'")
      .trim();
  }

  function tokenizeFrenchAlignment(frText){
    const raw = String(frText || "");
    const re = /(\[[^\]]*\]|\([^)]*\)|\s+|[\p{L}\p{N}][\p{L}\p{N}'’\-]*|[^\s])/gu;
    const tokens = [];
    const words = [];
    let m;
    while((m = re.exec(raw)) !== null){
      const text = m[0];
      const start = m.index;
      const end = start + text.length;
      let type = "punct";
      if(/^\s+$/u.test(text)) type = "space";
      else if((text.startsWith("[") && text.endsWith("]")) || (text.startsWith("(") && text.endsWith(")"))) type = "note";
      else if(/[\p{L}\p{N}]/u.test(text)) type = "word";
      const t = { text, start, end, type };
      if(type === "word"){
        t.norm = normalizeLatinForAlign(text);
        t.wi = words.length;
        words.push(t);
      }
      tokens.push(t);
    }
    const wordBoundaryToChar = new Array(words.length + 1).fill(0);
    wordBoundaryToChar[0] = 0;
    for(let i=1;i<words.length;i++) wordBoundaryToChar[i] = words[i].start;
    wordBoundaryToChar[words.length] = raw.length;
    return { raw, tokens, words, wordBoundaryToChar };
  }

  const FR_CONNECTORS = new Set(["et", "mais", "or", "car", "donc", "puis", "ensuite", "ainsi"]);

  const CUE_RULES = [
    { ar: /^وليكتب(?:\s|$)/u, frStart: [/^et qu.?un scribe/u, /^qu.?un scribe/u], weight: 1.8 },
    { ar: /^فليكتب(?:\s|$)/u, frStart: [/^qu.?il ecrive/u, /^qu.?il ecrive donc/u], weight: 1.6 },
    { ar: /^(فان|فإن) كان(?:\s|$)/u, frStart: [/^si /u], weight: 1.6 },
    { ar: /^فليملل وليه(?:\s|$)/u, frStart: [/^que son representant dicte/u], weight: 2.0 },
    { ar: /^(فان|فإن) لم يكونا(?:\s|$)/u, frStart: [/^et a defaut/u, /^a defaut/u], weight: 1.9 },
    { ar: /^تضل(?:\s|$)/u, frStart: [/^de sorte que si/u, /^si l.?une/u], weight: 1.5 },
    { ar: /^ولا ياب الشهداء(?:\s|$)/u, frStart: [/^et que les temoins ne refusent pas/u, /^que les temoins ne refusent pas/u], weight: 2.0 },
    { ar: /^ولا تساموا(?:\s|$)|^ولا تسأموا(?:\s|$)/u, frStart: [/^ne vous lassez pas/u], weight: 2.2 },
    { ar: /^ذلكم(?:\s|$)/u, frStart: [/^c['']?est plus equitable/u, /^cela est plus equitable/u], weight: 2.0 },
    { ar: /^(الا|إلا) ان تكون(?:\s|$)/u, frStart: [/^mais s.?il s.?agit/u, /^a moins qu.?il ne s.?agisse/u], weight: 2.1 },
    { ar: /^واشهدوا(?:\s|$)/u, frStart: [/^mais prenez des temoins/u, /^prenez des temoins/u], weight: 2.2 },
    { ar: /^(وان|وإن) تفعلوا(?:\s|$)/u, frStart: [/^si vous le faisiez/u, /^si vous le faites/u], weight: 1.8 },
    { ar: /^واتقوا الله(?:\s|$)/u, frStart: [/^et craignez allah/u, /^craignez allah/u], weight: 2.1 },
    { ar: /^ويعلمكم الله(?:\s|$)/u, frStart: [/^alors allah vous enseigne/u, /^allah vous enseigne/u], weight: 3.0 },
    { ar: /^والله بكل شيء عليم(?:\s|$)/u, frStart: [/^et allah est omniscient/u, /^allah est omniscient/u], weight: 3.4 },
  ];

  function getFrStartSignature(frTok, wPos, maxWords = 6){
    const out = [];
    for(let i = wPos; i < Math.min(frTok.words.length, wPos + maxWords); i++) out.push(frTok.words[i].norm || "");
    return out.join(" ").trim();
  }

  function getFrBoundaryInfo(frTok, wPos){
    const m = frTok.words.length;
    if(wPos <= 0 || wPos >= m){
      return { strength: 3, startTag: "edge", startSig: getFrStartSignature(frTok, wPos) };
    }
    const prev = frTok.words[wPos - 1];
    const next = frTok.words[wPos];
    const between = frTok.raw.slice(prev.end, next.start);
    const n0 = frTok.words[wPos]?.norm || "";
    const n1 = frTok.words[wPos + 1]?.norm || "";
    const n2 = frTok.words[wPos + 2]?.norm || "";
    const sig3 = [n0, n1, n2].filter(Boolean).join(" ");
    const startSig = getFrStartSignature(frTok, wPos);
    let strength = 0;
    if(/[.;:!?…]/.test(between)) strength = 2;
    else if(/[,،]/.test(between)) strength = 1;
    let startTag = "neutral";
    if(n0 === "si" || n0 === "quand" || n0 === "lorsque") startTag = "conditional";
    else if(FR_CONNECTORS.has(n0)) startTag = "connector";
    else if(sig3.startsWith("dans ce cas")) startTag = "consequence";
    else if(/^c['']?est$/.test(n0) || n0 === "cela") startTag = "demonstrative";
    else if(sig3.startsWith("alors allah vous") || sig3.startsWith("allah vous enseigne")) startTag = "teach";
    else if(sig3.startsWith("de sorte que")) startTag = "subclause";
    return { strength, startTag, startSig };
  }

  function buildArabicLineMeta(a){
    return (a.lines || []).map((ln, li) => {
      const effS = a.countBefore?.[ln.start] ?? 0;
      const effE = a.countBefore?.[ln.end] ?? effS;
      const effLen = Math.max(1, effE - effS);
      const endTok = a.tokens?.[Math.max(ln.start, ln.end - 1)] || "";
      const endStrength = isArabicPauseBoundaryToken(endTok) ? 2 : isPunctOnlyToken(endTok) ? 1 : 0;
      const linePlain = plainTextFromHtml((a.tokens || []).slice(ln.start, ln.end).join(" "));
      const lineNorm = normalizeArabicForAlign(linePlain).replace(/\s+/g, " ").trim();
      const allowConnector = /^(و|ف|ثم|بل|لكن)(?:\s|$)/u.test(lineNorm);
      const allowConditional =
        /^(اذا|إذا|ان|إن|فان|فإن|وان|وإن|لو|الا|إلا)(?:\s|$)/u.test(lineNorm) ||
        /^(الا|إلا) ان(?:\s|$)/u.test(lineNorm);
      const allowDemonstrative = /^ذلكم(?:\s|$)/u.test(lineNorm);
      const allowTeach = /^ويعلمكم الله(?:\s|$)/u.test(lineNorm);
      const cues = CUE_RULES.filter(rule => rule.ar.test(lineNorm));
      return { li, effS, effE, effLen, endStrength, lineNorm, allowConnector, allowConditional, allowDemonstrative, allowTeach, cues };
    });
  }

  function cumulativeTargetsFromArabic(lineMeta, totalEff, m){
    const out = [];
    let acc = 0;
    for(const lm of lineMeta){ acc += (lm.effLen / Math.max(1, totalEff)) * m; out.push(acc); }
    return out;
  }

  function startPenalty(lm, frBoundaryInfos, k){
    if(k <= 0) return 0;
    const info = frBoundaryInfos[k];
    let p = 0;
    if(info.strength === 0) p += 1.6;
    else if(info.strength === 1) p += 0.28;
    if(info.startTag === "connector" && !lm.allowConnector) p += 1.35;
    if(info.startTag === "conditional" && !lm.allowConditional) p += 1.35;
    if(info.startTag === "demonstrative" && !lm.allowDemonstrative) p += 1.55;
    if(info.startTag === "teach" && !lm.allowTeach) p += 2.8;
    if(info.startTag === "consequence" && !(lm.allowConditional || lm.allowConnector)) p += 1.45;
    if(info.startTag === "subclause" && !lm.allowConditional) p += 1.1;
    if(/^والله بكل شيء عليم(?:\s|$)/u.test(lm.lineNorm)){
      if(/^alors allah vous enseigne/.test(info.startSig) || /^allah vous enseigne/.test(info.startSig)) p += 4.5;
      if(!/^et allah est omniscient/.test(info.startSig) && !/^allah est omniscient/.test(info.startSig)) p += 2.8;
    }
    if(/^ويعلمكم الله(?:\s|$)/u.test(lm.lineNorm)){
      if(/^et allah est omniscient/.test(info.startSig) || /^allah est omniscient/.test(info.startSig)) p += 3.5;
    }
    if(lm.cues.length){
      let matched = false;
      for(const cue of lm.cues){
        if(cue.frStart.some(re => re.test(info.startSig))){ p -= cue.weight; matched = true; break; }
      }
      if(!matched) p += 1.1;
    }
    return p;
  }

  function overshootPenalty(frBoundaryInfos, k, j, idealEnd){
    let bestAlt = -1, bestAltDist = Infinity, bestAltStrength = -1;
    const lo = Math.max(k + 1, Math.floor(idealEnd) - 10);
    const hi = Math.min(j - 1, Math.ceil(idealEnd) + 8);
    for(let b = lo; b <= hi; b++){
      const info = frBoundaryInfos[b];
      if(!info || info.strength < 1) continue;
      const d = Math.abs(b - idealEnd);
      if(d < bestAltDist || (d === bestAltDist && info.strength > bestAltStrength)){
        bestAlt = b; bestAltDist = d; bestAltStrength = info.strength;
      }
    }
    if(bestAlt < 0 || bestAlt === j) return 0;
    const chosen = frBoundaryInfos[j];
    const curDist = Math.abs(j - idealEnd);
    if(bestAltDist + 1 < curDist || bestAltStrength > (chosen?.strength ?? 0))
      return 1.10 + 0.14 * Math.max(0, j - bestAlt - 1);
    return 0;
  }

  function endPenalty(lm, frBoundaryInfos, j, idealEnd, expectedWords, k){
    const info = frBoundaryInfos[j];
    let p = 0;
    if(j < frBoundaryInfos.length - 1){
      if(lm.endStrength >= 2 && info.strength < 2) p += 1.35;
      else if(lm.endStrength >= 1 && info.strength === 0) p += 0.55;
    }
    const d = Math.abs(j - idealEnd) / Math.max(2, expectedWords);
    p += 0.35 * d + 1.15 * d * d;
    p += overshootPenalty(frBoundaryInfos, k, j, idealEnd);
    return p;
  }

  function segmentLengthPenalty(segLen, expectedWords){
    const exp = Math.max(1, expectedWords);
    const d = Math.abs(segLen - exp) / exp;
    let p = 1.90 * d + 1.40 * d * d;
    if(segLen <= 1 && exp > 2.2) p += 1.10;
    if(segLen < exp * 0.45) p += 0.80;
    if(segLen > exp * 1.80) p += 0.90;
    return p;
  }

  function buildTransitionCostFn(groupMeta, frTok, totalEff){
    const m = frTok.words.length;
    const infos = Array.from({ length: m + 1 }, (_, i) => getFrBoundaryInfo(frTok, i));
    const cumTargets = cumulativeTargetsFromArabic(groupMeta, totalEff, m);
    const expectedWords = groupMeta.map(lm => (lm.effLen / Math.max(1, totalEff)) * m);
    function cost(li, k, j){
      const lm = groupMeta[li];
      const expected = expectedWords[li];
      const idealEnd = cumTargets[li];
      const segLen = j - k;
      let c = 0;
      c += segmentLengthPenalty(segLen, expected);
      c += startPenalty(lm, infos, k);
      c += endPenalty(lm, infos, j, idealEnd, expected, k);
      return c;
    }
    return { cost, infos, cumTargets, expectedWords };
  }

  function refineBoundariesLocally(bounds, groupMeta, transCost, m){
    const nG = groupMeta.length;
    if(bounds.length !== nG + 1) return bounds;
    const out = bounds.slice();
    for(let pass = 0; pass < 2; pass++){
      for(let i = 1; i < nG; i++){
        const leftFixed = out[i - 1];
        const rightFixed = out[i + 1];
        const cur = out[i];
        const lo = Math.max(leftFixed + 1, cur - 4);
        const hi = Math.min(rightFixed - 1, cur + 4);
        let best = cur;
        let bestScore = transCost.cost(i - 1, leftFixed, cur) + transCost.cost(i, cur, rightFixed);
        for(let cand = lo; cand <= hi; cand++){
          const sc = transCost.cost(i - 1, leftFixed, cand) + transCost.cost(i, cand, rightFixed);
          if(sc < bestScore){ bestScore = sc; best = cand; }
        }
        out[i] = best;
      }
    }
    out[0] = 0;
    out[nG] = m;
    return out;
  }

  function alignFrenchToArabicLines(a){
    const frText = String(a.frText || "");
    const frTok = tokenizeFrenchAlignment(frText);
    const m = frTok.words.length;
    const n = a.lines?.length || 0;
    const totalEff = a.totalEff || 0;
    const emptyBoundary = new Array(totalEff + 1).fill(0);

    if(!frText.trim() || !m || !n || totalEff <= 0){
      if(totalEff > 0) emptyBoundary[totalEff] = m;
      return { frTok, frLines: new Array(n).fill(frText.trim()),
               frBounds: new Array(n + 1).fill(0).map((_, i) => i === n ? m : 0),
               frWordBoundaryAtEff: emptyBoundary };
    }

    if(n === 1){
      const one = new Array(totalEff + 1).fill(0);
      for(let e = 0; e <= totalEff; e++) one[e] = Math.round((e / Math.max(1, totalEff)) * m);
      return { frTok, frLines: [frText.trim()], frBounds: [0, m], frWordBoundaryAtEff: one };
    }

    const lineMeta = buildArabicLineMeta(a);
    const SHORT_LINE_THRESH = 2;

    const groups = [];
    for(let li = 0; li < n; li++){
      const lm = lineMeta[li];
      if(lm.effLen <= SHORT_LINE_THRESH && li > 0 && groups.length > 0){
        const g = groups[groups.length - 1];
        g.lineIdxs.push(li);
        g.effE = lm.effE;
        g.effLen += lm.effLen;
        g.endStrength = Math.max(g.endStrength, lm.endStrength);
        g.cues = [...g.cues, ...lm.cues];
        g.allowConnector = g.allowConnector || lm.allowConnector;
        g.allowConditional = g.allowConditional || lm.allowConditional;
        g.allowDemonstrative = g.allowDemonstrative || lm.allowDemonstrative;
        g.allowTeach = g.allowTeach || lm.allowTeach;
      } else {
        groups.push({
          lineIdxs: [li],
          effS: lm.effS, effE: lm.effE, effLen: lm.effLen,
          endStrength: lm.endStrength, lineNorm: lm.lineNorm,
          allowConnector: lm.allowConnector, allowConditional: lm.allowConditional,
          allowDemonstrative: lm.allowDemonstrative, allowTeach: lm.allowTeach,
          cues: [...lm.cues]
        });
      }
    }
    const nGroups = groups.length;

    const transCost = buildTransitionCostFn(groups, frTok, totalEff);
    const { cumTargets, expectedWords } = transCost;

    const INF = 1e15;
    const dp = Array.from({ length: nGroups + 1 }, () => new Array(m + 1).fill(INF));
    const prev = Array.from({ length: nGroups + 1 }, () => new Array(m + 1).fill(-1));
    dp[0][0] = 0;

    for(let gi = 0; gi < nGroups; gi++){
      const idealEnd = cumTargets[gi];
      const exp = expectedWords[gi];
      const window = Math.max(10, Math.ceil(exp * 2.4), Math.ceil(m * 0.16));
      const minJ = Math.max(gi + 1, Math.floor(idealEnd - window));
      const maxJ = Math.min(m - (nGroups - gi - 1), Math.ceil(idealEnd + window));

      for(let j = minJ; j <= maxJ; j++){
        const maxSegLen = Math.max(2, Math.ceil(exp * 2.6) + 6);
        const minK = Math.max(gi, j - maxSegLen);
        for(let k = minK; k < j; k++){
          if(!Number.isFinite(dp[gi][k])) continue;
          const c = dp[gi][k] + transCost.cost(gi, k, j);
          if(c < dp[gi + 1][j]){ dp[gi + 1][j] = c; prev[gi + 1][j] = k; }
        }
      }
    }

    let groupBounds = null;
    if(Number.isFinite(dp[nGroups][m])){
      groupBounds = new Array(nGroups + 1).fill(0);
      groupBounds[nGroups] = m;
      let j = m;
      for(let gi = nGroups; gi > 0; gi--){
        const k = prev[gi][j];
        if(k < 0){ groupBounds = null; break; }
        groupBounds[gi - 1] = k;
        j = k;
      }
    }
    if(!groupBounds){
      groupBounds = new Array(nGroups + 1).fill(0);
      for(let gi = 1; gi < nGroups; gi++)
        groupBounds[gi] = clamp(Math.round((gi / nGroups) * m), groupBounds[gi-1]+1, m-(nGroups-gi));
      groupBounds[nGroups] = m;
    }

    const refinedGroup = refineBoundariesLocally(groupBounds, groups, transCost, m);

    const bounds = new Array(n + 1).fill(0);
    bounds[0] = 0;
    bounds[n] = m;
    for(let gi = 0; gi < nGroups; gi++){
      const g = groups[gi];
      const wS = refinedGroup[gi];
      const wE = refinedGroup[gi + 1];
      bounds[g.lineIdxs[0]] = wS;
      if(g.lineIdxs.length === 1){
        bounds[g.lineIdxs[0] + 1] = wE;
      } else {
        let cumEff = 0;
        const totalGroupEff = g.effLen;
        for(let k = 0; k < g.lineIdxs.length - 1; k++){
          const li = g.lineIdxs[k];
          cumEff += lineMeta[li].effLen;
          const r = cumEff / totalGroupEff;
          const raw = Math.round(wS + r * (wE - wS));
          bounds[li + 1] = clamp(raw, wS + k + 1, wE - (g.lineIdxs.length - 1 - k));
        }
        bounds[g.lineIdxs[g.lineIdxs.length - 1] + 1] = wE;
      }
    }
    for(let i = 1; i <= n; i++) bounds[i] = Math.max(bounds[i], bounds[i-1] + 1);
    bounds[n] = m;

    const frLines = [];
    for(let li = 0; li < n; li++){
      const ws = bounds[li];
      const we = bounds[li + 1];
      const c0 = frTok.wordBoundaryToChar[ws] ?? 0;
      const c1 = frTok.wordBoundaryToChar[we] ?? frTok.raw.length;
      frLines.push(frTok.raw.slice(c0, c1).trim());
    }

    for(let li = 1; li < n; li++){
      if(lineMeta[li].effLen <= SHORT_LINE_THRESH && frLines[li-1]){
        const ownWords = (frLines[li]||'').split(/\s+/).filter(Boolean).length;
        if(ownWords === 0 || bounds[li] >= bounds[li+1]){
          frLines[li] = frLines[li-1];
        }
      }
    }

    const frWordBoundaryAtEff = new Array(totalEff + 1).fill(0);
    for(let li = 0; li < n; li++){
      const lm = lineMeta[li];
      const frS = bounds[li];
      const frE = bounds[li + 1];
      const den = Math.max(1, lm.effE - lm.effS);
      for(let e = lm.effS; e <= lm.effE; e++){
        const r = (e - lm.effS) / den;
        frWordBoundaryAtEff[e] = clamp(Math.round(frS + (frE - frS) * r), 0, m);
      }
    }
    for(let e = 1; e <= totalEff; e++) frWordBoundaryAtEff[e] = Math.max(frWordBoundaryAtEff[e], frWordBoundaryAtEff[e-1]);
    frWordBoundaryAtEff[totalEff] = m;

    return { frTok, frLines, frBounds: bounds, frWordBoundaryAtEff };
  }

  // ===== Quran.com tajweed fetch =====
  async function fetchArabicTajweedSurahFromQuranCom(chapterNumber){
    const perPage = 50;
    let page = 1;
    let out = [];
    let guard = 0;

    while(true){
      guard++;
      if(guard > 50) throw new Error("Pagination Quran.com: boucle détectée (guard).");

      const url =
        `${QURAN_COM_BASE}/verses/by_chapter/${chapterNumber}` +
        `?fields=text_uthmani_tajweed,verse_key,verse_number` +
        `&page=${page}&per_page=${perPage}`;

      const res = await fetchWithTimeout(url, 12000);
      if(!res.ok) throw new Error(`Quran.com API HTTP ${res.status} sur ${url}`);
      const json = await res.json();

      const verses = Array.isArray(json?.verses) ? json.verses : [];
      for(const v of verses){
        const inSurah = Number(v.verse_number);
        const verseKey = String(v.verse_key || `${chapterNumber}:${inSurah}`);
        const rawHtml = String(v.text_uthmani_tajweed || "");
        const cleaned = stripTrailingAyahNumberHtml(rawHtml);
        if(Number.isFinite(inSurah)){
          out.push({ inSurah, verseKey, arHtmlRaw: cleaned, markerHtml: buildAyahMarkerHtml(inSurah) });
        }
      }

      const p = json?.pagination || json?.meta?.pagination || null;
      const nextPage = p?.next_page;

      if(nextPage){
        page = nextPage;
      } else {
        if(out.length === 50 && (p?.total_pages || 0) > 1){
          showDbg("⚠️ Pagination détectée mais next_page manquant: vérifie la réponse API.\n" + JSON.stringify(p, null, 2));
        }
        break;
      }
    }

    out.sort((a,b) => a.inSurah - b.inSurah);
    return out;
  }

  // ===== Service Worker helpers =====
  async function registerSW(){
    if (!("serviceWorker" in navigator)) {
      showDbg("Service Worker non supporté: cache local désactivé.");
      $download.disabled = true;
      $clearCache.disabled = true;
      return null;
    }
    try{
      const reg = await navigator.serviceWorker.register("./sw.js");
      await navigator.serviceWorker.ready;
      return reg;
    } catch(e){
      showDbg("Service Worker: échec d'enregistrement.\n" + String(e));
      $download.disabled = true;
      $clearCache.disabled = true;
      return null;
    }
  }

  function swStreamMessage(payload, onMsg){
    return new Promise((resolve, reject) => {
      const sw = navigator.serviceWorker.controller;
      if(!sw) return reject(new Error("SW non contrôleur (recharge la page 1 fois)."));
      const channel = new MessageChannel();
      channel.port1.onmessage = (ev) => {
        onMsg(ev.data);
        if(ev.data?.type === "DONE" || ev.data?.type === "CLEARED") resolve(ev.data);
      };
      sw.postMessage(payload, [channel.port2]);
    });
  }

  async function clearCache(){
    $clearCache.disabled = true;
    setStatus("Vidage cache…");
    await swStreamMessage({ type: "CLEAR_CACHE" }, (msg) => {
      if(msg?.type === "CLEARED"){
        showDbg("Cache effacé.");
        setStatus("Cache vidé");
      }
    }).catch(e => {
      showErr("Erreur vidage cache:\n" + String(e));
      setStatus("Erreur");
    });
    $clearCache.disabled = false;
  }

  // ===== QUL loader =====
  function isVerseKey(k){ return typeof k === "string" && /^\d+:\d+$/.test(k); }
  function normalizeSegments(arr){
    if(!Array.isArray(arr)) return [];
    return arr
      .filter(x => Array.isArray(x) && x.length >= 3)
      .map(x => [Number(x[0]), Number(x[1]), Number(x[2])])
      .filter(x => Number.isFinite(x[1]) && Number.isFinite(x[2]) && x[2] >= x[1])
      .sort((a,b) => a[1] - b[1]);
  }
  function putEntry(bySurah, s, a, v){
    const audioUrl = normalizeAudioUrl(v?.audio_url || v?.audioUrl || v?.audio);
    const segs = normalizeSegments(v?.segments);
    if(!Number.isFinite(s) || !Number.isFinite(a) || !audioUrl) return;
    if(!bySurah.has(s)) bySurah.set(s, new Map());
    bySurah.get(s).set(a, { audioUrl, segments: segs });
  }
  function looksLikeFlat(obj){
    const keys = Object.keys(obj);
    return keys.slice(0, Math.min(10, keys.length)).some(k => isVerseKey(k));
  }
  function looksLikeNested(obj){
    const sKey = Object.keys(obj).find(k => /^\d+$/.test(k));
    if(!sKey) return false;
    const inside = obj[sKey];
    if(!inside || typeof inside !== "object" || Array.isArray(inside)) return false;
    return Object.keys(inside).some(k => /^\d+$/.test(k));
  }
  function parseArrayQul(arr){
    const bySurah = new Map();
    for(const row of arr){
      if(!row || typeof row !== "object") continue;
      let s=null,a=null;
      const vk = row.verse_key || row.verseKey;
      if(typeof vk === "string" && isVerseKey(vk)){
        const [ss,aa] = vk.split(":");
        s = Number(ss); a = Number(aa);
      } else {
        s = Number(row.surah ?? row.chapter ?? row.s);
        a = Number(row.ayah ?? row.aya ?? row.verse ?? row.a);
      }
      putEntry(bySurah, s, a, row);
    }
    return bySurah;
  }
  async function loadQulAyahJson(reciter){
    if(qulLoadedPath === reciter.jsonPath && qulBySurah) return;

    setStatus("Chargement QUL JSON…");
    const res = await fetchWithTimeout(reciter.jsonPath, 25000);
    if(!res.ok) throw new Error(`QUL JSON introuvable: HTTP ${res.status} sur ${reciter.jsonPath}`);
    const json = await res.json();

    let bySurah = null;

    if(Array.isArray(json)){
      bySurah = parseArrayQul(json);
    } else if(json && typeof json === "object"){
      if(looksLikeFlat(json)){
        bySurah = new Map();
        for(const [k,v] of Object.entries(json)){
          if(!isVerseKey(k)) continue;
          const [ss,aa] = k.split(":");
          putEntry(bySurah, Number(ss), Number(aa), v);
        }
      } else if(looksLikeNested(json)){
        bySurah = new Map();
        for(const [sKey, sVal] of Object.entries(json)){
          const s = Number(sKey);
          if(!Number.isFinite(s) || !sVal || typeof sVal !== "object") continue;
          for(const [aKey, v] of Object.entries(sVal)){
            const a = Number(aKey);
            if(!Number.isFinite(a)) continue;
            putEntry(bySurah, s, a, v);
          }
        }
      } else {
        const maybeArr =
          (Array.isArray(json.result) && json.result) ||
          (Array.isArray(json.data) && json.data) ||
          (Array.isArray(json.results) && json.results) ||
          (Array.isArray(json.items) && json.items);
        if(maybeArr) bySurah = parseArrayQul(maybeArr);
      }
    }

    if(!bySurah || bySurah.size === 0){
      const rootKeys = (json && typeof json === "object" && !Array.isArray(json))
        ? Object.keys(json).slice(0, 30).join(", ")
        : "(racine = array)";
      throw new Error(
        "QUL JSON: format non reconnu.\n"
      );
    }

    qulBySurah = bySurah;
    qulLoadedPath = reciter.jsonPath;
    showDbg(`QUL JSON chargé ✅\nSourates: ${qulBySurah.size}\nFichier: ${reciter.jsonPath}`);
  }

  function seedFairyParticles(layer){
    layer.innerHTML = "";
    const count = 6 + Math.floor(Math.random() * 4);
    for(let i=0;i<count;i++){
      const p = document.createElement("span");
      const isDust = Math.random() < 0.35;

      const y  = 32 + Math.random() * 52;
      const s  = isDust ? (2.2 + Math.random()*2.2) : (2.6 + Math.random()*3.0);

      const d  = Math.random()*950;

  function fadeOutParticles(prevWord){
    if(!prevWord) return;
    const layer = prevWord.querySelector(".p-layer");
    if(!layer) return;
    layer.style.opacity = "0";
    setTimeout(() => {
      if(!prevWord.classList.contains("hl")) layer.innerHTML = "";
    }, 650);
  }

  function nextNonSkippable(a, i, dir=+1){
    if(!a?.tokens) return i;
    let j = i;
    while(j >= 0 && j < a.tokens.length && isSkippableToken(a.tokens[j])){
      j += dir;
    }
    return clamp(j, 0, a.tokens.length - 1);
  }

  function setHighlightWord(globalWordIndex){
    const a = ayahs[idx];
    if(a?.tokens && isSkippableToken(a.tokens[globalWordIndex])) return;

    const prev = $ar.querySelector(".w.hl");
    if(prev){
      prev.classList.remove("hl");
      fadeOutParticles(prev);
    }
    const next = $ar.querySelector(`.w[data-i="${globalWordIndex}"]`);
    if(next){
      next.classList.add("hl");
      applyParticlePalette();
      const layer = ensureParticleLayer(next);
      seedFairyParticles(layer);
      layer.style.opacity = "0";
      requestAnimationFrame(() => { layer.style.opacity = "1"; });
    }
  }

  // ===== Rendering helpers =====
  function getSurahLabel(n){
    const name = SURAH_NAME.get(n) || ("Sourate " + n);
    return `${n}. ${name}`;
  }
  function getBoxWidth(){
    const box = document.getElementById("boxAr");
    return Math.max(0, (box?.clientWidth || 0) - 24);
  }

  function enforceNoOverflow(a, ln, isLastLine){
    const maxW = getBoxWidth() - 6;
    if($ar.scrollWidth <= maxW) return ln;

    let tries = 0;
    let end = ln.end;

    while(tries < 6 && end > ln.start + 1){
      end--;
      const parts = [];
      for(let i = ln.start; i < end; i++){
        const tok = a.tokens[i];
        parts.push(`<span class="w" data-i="${i}">${tok}</span>`);
      }
      const lineHtml = `<span class="rtl-line">${parts.join(" ")}</span>`;
      $ar.innerHTML = lineHtml + (isLastLine ? (a.markerHtml||"") : "");
      tries++;
      if($ar.scrollWidth <= maxW) break;
    }
    return { start: ln.start, end };
  }

  function renderNormalFull(){
    const a = ayahs[idx];
    if(!a) return;
    $meta.textContent = `[${APP_VERSION}] ${getSurahLabel(surah)} — Ayah ${a.inSurah} — ${reciterObj.name}`;
    $ar.innerHTML = (a.arHtmlRaw || "") + (a.markerHtml || "");
    $fr.textContent = frByAya.get(a.inSurah) || "";
  }

  function renderQulLine(lineIndex, highlightWordIndex){
    const a = ayahs[idx];
    if(!a) return;

    const li = clamp(lineIndex, 0, (a.lines?.length||1) - 1);
    currentLineIdx = li;

    let ln = a.lines[li] || { start:0, end:a.tokens.length };
    const isLastLine = (li === a.lines.length - 1);

    $fr.textContent = ($trKey.value ? (a.frLines?.[li] || a.frText || "") : "");

    if(!wbwEnabled){
      const chunkHtml = a.tokens.slice(ln.start, ln.end).join(" ");
      $ar.innerHTML = chunkHtml + (isLastLine ? (a.markerHtml||"") : "");
      renderedLineKey = "";
      $meta.textContent = `[${APP_VERSION}] ${getSurahLabel(surah)} — Ayah ${a.inSurah} — ${reciterObj.name} — ligne ${li+1}/${a.lines.length}`;
      return;
    }

    const key = `${surah}:${a.inSurah}:${li}:${wbwEffect}:${mobileMode?"m":"d"}`;
    if(key !== renderedLineKey){
      renderedLineKey = key;

      const parts = [];
      for(let i = ln.start; i < ln.end; i++){
        const tok = a.tokens[i];
        parts.push(`<span class="w" data-i="${i}">${tok}</span>`);
      }
      const lineHtml = `<span class="rtl-line">${parts.join(" ")}</span>`;
      $ar.innerHTML = lineHtml + (isLastLine ? (a.markerHtml||"") : "");

      ln = enforceNoOverflow(a, ln, isLastLine);

      let hi = Number.isFinite(highlightWordIndex) ? highlightWordIndex : ln.start;
      hi = clamp(hi, ln.start, Math.max(ln.start, ln.end - 1));
      if(isSkippableToken(a.tokens[hi])) hi = nextNonSkippable(a, hi, +1);
      hi = clamp(hi, ln.start, Math.max(ln.start, ln.end - 1));
      setHighlightWord(hi);
    } else {
      let hi = Number.isFinite(highlightWordIndex) ? highlightWordIndex : ln.start;
      hi = clamp(hi, ln.start, Math.max(ln.start, ln.end - 1));
      if(isSkippableToken(a.tokens[hi])) hi = nextNonSkippable(a, hi, +1);
      hi = clamp(hi, ln.start, Math.max(ln.start, ln.end - 1));
      setHighlightWord(hi);
    }

    $meta.textContent = `[${APP_VERSION}] ${getSurahLabel(surah)} — Ayah ${a.inSurah} — ${reciterObj.name} — ligne ${li+1}/${a.lines.length}`;
  }

  function findWordIndexFromSegments(segments, ms){
    if(!segments || !segments.length) return 0;
    let lo = 0, hi = segments.length - 1;
    while(lo <= hi){
      const mid = (lo + hi) >> 1;
      const s = segments[mid][1], e = segments[mid][2];
      if(ms < s) hi = mid - 1;
      else if(ms > e) lo = mid + 1;
      else return mid;
    }
    return clamp(hi, 0, segments.length - 1);
  }

  function stopSyncLoop(){
    if(rafId){ cancelAnimationFrame(rafId); rafId = null; }
  }

  function startQulSyncLoop(){
    stopSyncLoop();
    const tick = () => {
      if(reciterObj.type !== "qul_ayah" || !$audio.src) return;
      const a = ayahs[idx];
      if(!a || !a.segments || !a.tokens || !a.wordToLine) return;

      const ms = $audio.currentTime * 1000;
      let wi = findWordIndexFromSegments(a.segments, ms);

      let wic = clamp(wi, 0, a.tokens.length - 1);
      if(isSkippableToken(a.tokens[wic])) wic = nextNonSkippable(a, wic, +1);

      const li = a.wordToLine[wic] ?? 0;

      if(li !== currentLineIdx){
        currentWordIdx = wic;
        renderedLineKey = "";
        renderQulLine(li, wic);
      } else if(wic !== currentWordIdx){
        currentWordIdx = wic;
        if(wbwEnabled) setHighlightWord(wic);
      }
      rafId = requestAnimationFrame(tick);
    };
    rafId = requestAnimationFrame(tick);
  }

  function normalizeMp3qTiming(json){
    if(!Array.isArray(json)) return [];
    return json
      .map(x => ({
        ayah: Number(x?.ayah),
        start: Number(x?.start_time),
        end: Number(x?.end_time)

  function mp3qFindAyahAtMs(ms){
    if(!mp3qTiming || !mp3qTiming.length) return null;
    const usable = mp3qTiming.filter(x => x.ayah >= 1);
    if(!usable.length) return null;

    if(ms < usable[0].start){
      return { ayah: usable[0].ayah, start: usable[0].start, end: usable[0].end, msClamped: usable[0].start };
    }
    if(ms >= usable[usable.length-1].end){
      const last = usable[usable.length-1];
      return { ayah: last.ayah, start: last.start, end: last.end, msClamped: Math.max(last.start, Math.min(ms, last.end)) };
    }

    let lo = 0, hi = usable.length - 1, best = 0;
    while(lo <= hi){
      const mid = (lo+hi)>>1;
      if(usable[mid].start <= ms){ best = mid; lo = mid+1; }
      else hi = mid-1;
    }
    const cur = usable[best];
    if(ms >= cur.end && best+1 < usable.length){
      const nxt = usable[best+1];
      return { ayah: nxt.ayah, start: nxt.start, end: nxt.end, msClamped: nxt.start };
    }
    return { ayah: cur.ayah, start: cur.start, end: cur.end, msClamped: ms };
  }

  function startMp3qSyncLoop(){
    stopSyncLoop();
    const tick = () => {
      if(reciterObj.type !== "mp3q_timing" || !$audio.src) return;
      if(!mp3qTiming || !mp3qTiming.length){ rafId = requestAnimationFrame(tick); return; }

      const ms = ($audio.currentTime || 0) * 1000;
      const seg = mp3qFindAyahAtMs(ms);
      if(!seg){ rafId = requestAnimationFrame(tick); return; }

      const targetAyah = seg.ayah;
      const newIdx = ayahs.findIndex(x => x.inSurah === targetAyah);
      if(newIdx >= 0 && newIdx !== idx){
        idx = newIdx;
        currentLineIdx = 0;
        currentWordIdx = 0;
        renderedLineKey = "";
        renderQulLine(0, 0);
        if($ayah.value !== String(idx)) $ayah.value = String(idx);
      }

      const a = ayahs[idx];
      if(a && a.tokens && a.wordToLine && a.effToTok && a.totalEff){
        const durMs = Math.max(1, seg.end - seg.start);
        const r = clamp((seg.msClamped - seg.start) / durMs, 0, 0.999999);
        const effPos = clamp(Math.floor(r * a.totalEff), 0, Math.max(0, a.totalEff-1));
        let tokIdx = a.effToTok[effPos] ?? 0;
        tokIdx = clamp(tokIdx, 0, a.tokens.length-1);

        const li = a.wordToLine[tokIdx] ?? 0;
        if(li !== currentLineIdx){
          currentLineIdx = li;
          currentWordIdx = tokIdx;
          renderedLineKey = "";
          renderQulLine(li, tokIdx);
        }
      }

      rafId = requestAnimationFrame(tick);
    };
    rafId = requestAnimationFrame(tick);
  }

  function startLocalSyncLoop(){
    stopSyncLoop();
    const tick = () => {
      if(reciterObj.type !== "local" || !$audio.src){
        return;
      }
      const a = ayahs[idx];
      if(!a || !a.tokens || !a.lines || !a.wordToLine || !a.effToTok || !a.totalEff){
        rafId = requestAnimationFrame(tick);
        return;
      }

      const dur = $audio.duration || 0;
      if(!(dur > 0)){
        rafId = requestAnimationFrame(tick);
        return;
      }

      const r = clamp(($audio.currentTime || 0) / dur, 0, 0.999999);

      const effPos = clamp(Math.floor(r * a.totalEff), 0, Math.max(0, a.totalEff - 1));
      let tokIdx = a.effToTok[effPos] ?? 0;
      tokIdx = clamp(tokIdx, 0, a.tokens.length - 1);

      if(wbwEnabled && isSkippableToken(a.tokens[tokIdx])){
        tokIdx = nextNonSkippable(a, tokIdx, +1);
      }

      const li = a.wordToLine[tokIdx] ?? 0;

      if(li !== currentLineIdx){
        currentLineIdx = li;
        currentWordIdx = tokIdx;
        renderedLineKey = "";
        renderQulLine(li, tokIdx);
      } else if(wbwEnabled && tokIdx !== currentWordIdx){
        currentWordIdx = tokIdx;
        setHighlightWord(tokIdx);
      }

      rafId = requestAnimationFrame(tick);
    };
    rafId = requestAnimationFrame(tick);
  }

  function arabicToPhonetic(input){
    if(!input) return "";
    let s = String(input);
    s = s.replace(/[\u064B-\u065F\u0670\u06D6-\u06ED]/g, "").replace(/\u0640/g, "").trim();
    if(!/[\u0600-\u06FF]/.test(s)) return s;
    s = s.replace(/\s+/g, " ");

    const map = {
      "ا":"a","أ":"a","إ":"i","آ":"aa","ٱ":"a",
      "ب":"b","ت":"t","ث":"th","ج":"j","ح":"h","خ":"kh",
      "د":"d","ذ":"dh","ر":"r","ز":"z","س":"s","ش":"sh",
      "ص":"s","ض":"d","ط":"t","ظ":"z",
      "ع":"‘a","غ":"gh",
      "ف":"f","ق":"q","ك":"k","ل":"l","م":"m","ن":"n",
      "ه":"h","و":"w","ي":"y","ى":"a","ة":"a","ء":"'"

    };

    let out = "";
    for(const ch of s){
      out += (map[ch] !== undefined) ? map[ch] : ch;
    }
    out = out.replace(/\s+/g, " ").trim();
    out = out.split(" ").map(w => w ? (w[0].toUpperCase()+w.slice(1)) : w).join(" ");
    return out;
  }
  function mp3qDisplayName(r){
    const orig = String(r?.name || "").trim();

    const phon = arabicToPhonetic(orig);

    return orig;
  }

  const AUTO_PRELOAD_ENABLED = true;
  const AUTO_PRELOAD_MAX_URLS = 50;

  let autoPreloadBusy = false;

  function getAyahAudioUrlsRange(startInSurah, endInSurahInclusive){
    const urls = [];
    for(const a of ayahs){
      const n = a?.inSurah;
      if(!Number.isFinite(n)) continue;
      if(n < startInSurah || n > endInSurahInclusive) continue;
      if(a.audioUrl) urls.push(a.audioUrl);
      if(urls.length >= AUTO_PRELOAD_MAX_URLS) break;
    }
    return urls;

  function canAutoPreloadNow(){
    if(!AUTO_PRELOAD_ENABLED) return false;
    if(!("serviceWorker" in navigator)) return false;
    if(!navigator.serviceWorker.controller) return false;
    if(!ayahs?.length) return false;
    if(reciterObj?.type === "mp3q_timing") return false;

  async function autoPredownloadLookahead(){
    if(!canAutoPreloadNow()) return;
    if(autoPreloadBusy) return;

    const curInSurah = ayahs[idx]?.inSurah;
    if(!Number.isFinite(curInSurah)) return;

    if(curInSurah < AUTO_PRELOAD_TRIGGER) return;

    const start = curInSurah + 1;
    const end = curInSurah + AUTO_PRELOAD_LOOKAHEAD;

    const urls = getAyahAudioUrlsRange(start, end);
    if(!urls.length) return;

    const key = `${surah}|${reciterObj.type}|${reciterObj.id || reciterObj.readId}|${start}-${end}|${urls.length}`;
    if(key === autoPreloadKey) return;
    autoPreloadKey = key;

    autoPreloadBusy = true;

    const jobId = `auto-${surah}-${reciterObj.type}-${reciterObj.id || reciterObj.readId}-${start}-${Date.now()}`;

    setStatus(`Précharge auto… (+${urls.length})`);

    try{
      await swStreamMessage(
        { type:"PREDOWNLOAD", id: jobId, urls },
        (msg) => { if(msg?.type==="DONE") setStatus("Prêt"); }
      );
    } catch(e){
      setStatus("Prêt");
    } finally{
      autoPreloadBusy = false;
    }
  }
